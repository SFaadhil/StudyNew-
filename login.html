<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>StudyNew | Admin Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
</head>

<body class="min-h-screen flex items-center justify-center
             bg-slate-100 dark:bg-slate-900 transition">

  <div class="bg-white dark:bg-slate-800 p-10 rounded-2xl shadow-xl w-[360px]">
    <h1 class="text-2xl font-semibold mb-6 dark:text-white">
      Admin Login
    </h1>

    <input id="username"
      type="text"
      placeholder="Username"
      class="w-full mb-4 px-4 py-2 rounded-lg border
             dark:bg-slate-700 dark:text-white" />

    <input id="password"
      type="password"
      placeholder="Password"
      class="w-full mb-6 px-4 py-2 rounded-lg border
             dark:bg-slate-700 dark:text-white" />

    <button onclick="login()"
      class="w-full bg-black text-white py-2 rounded-lg
             hover:opacity-90 transition">
      Login
    </button>

    <p id="error"
       class="text-red-500 text-sm mt-4 hidden">
      Invalid credentials
    </p>
  </div>

<script>
function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  // MOCK ADMIN CREDENTIALS
  if (user === "admin" && pass === "admin123") {
    localStorage.setItem("isAdmin", "true");
    window.location.href = "chat.html";
  } else {
    document.getElementById("error").classList.remove("hidden");
  }
}
</script>

</body>
</html>
